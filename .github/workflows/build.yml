name: Build ProjectTimer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name "ProjectTimer" --icon "clock.ico" project_timer.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: ProjectTimer
          path: dist/ProjectTimer.exe
